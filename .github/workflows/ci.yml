name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: crowdpay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run linter (ESLint)
        working-directory: ./backend
        run: npx eslint .

      - name: Run test suite
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/crowdpay_test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PLATFORM_SECRET_KEY: ${{ secrets.PLATFORM_SECRET_KEY }}
          STELLAR_NETWORK: ${{ secrets.STELLAR_NETWORK }}
          USDC_ISSUER: ${{ secrets.USDC_ISSUER }}
        run: npm test

  frontend-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linter
        working-directory: ./frontend
        run: npx eslint .

      - name: Run build
        working-directory: ./frontend
        run: npm run build
